# M16 — mechanical gate for audit-class regressions.
# Runs the same two checks we rely on by hand all session: the TypeScript
# type-check and the vitest suite. A red check here blocks the merge button,
# so a type error or a broken test can't ride into main unnoticed.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run check

      - name: Tests
        run: pnpm run test
