# M16 — mechanical gate for audit-class regressions.
# Phase 1 (this PR): typecheck only. `tsc --noEmit` is fully green and has caught
# real regressions all session, so it's a meaningful, blocking gate today.
#
# The vitest suite is intentionally NOT run here yet: several pre-existing tests
# require live secrets (RESEND/REPLICATE/OWNER_OPEN_ID/STRIPE) or fail on unrelated
# mock debt (webhook signature tests), so a test step would be red for reasons
# orthogonal to a PR's changes — a gate that doesn't gate. A follow-up
# suite-hardening PR makes the suite CI-green (skipIf credential-dependent tests,
# repair the webhook mocks, lazy Stripe init) and then adds the test step here.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        # Version comes from package.json "packageManager"; specifying it here too
        # makes the action error with ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run check
