# M16 — mechanical gate for audit-class regressions. Runs the two checks we rely
# on by hand all session: the TypeScript type-check and the vitest suite. A red
# check blocks the merge button, so a type error or a broken test can't ride into
# main unnoticed.
#
# Credential-dependent tests (live RESEND/REPLICATE/OWNER/STRIPE) skip themselves
# when their secret is absent (it.skipIf), so the suite is green in a clean CI
# environment and still runs fully where the secrets exist.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    name: typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        # Version comes from package.json "packageManager"; specifying it here too
        # makes the action error with ERR_PNPM_BAD_PM_VERSION.
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run check

      - name: Tests
        run: pnpm run test

  db-integration:
    name: money-path integration (real Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: studio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/studio_test"
      RUN_DB_TESTS: "1"
    steps:
      - uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply schema to test DB
        run: pnpm exec drizzle-kit migrate
      - name: Integration tests (money-path + cross-org isolation)
        run: pnpm exec vitest run server/creditLedger.integration.test.ts server/orgIsolation.integration.test.ts

  # Supply-chain faucet gate — mirrors astersports/aster-sports (Phase 0.0 /
  # PLAN_ON_TRUTH). Dependency changes that are EITHER a major-version bump OR
  # touch a money/child/auth-adjacent package (stripe, @stripe/*, @supabase/*,
  # cookie, jose, etc.) must NOT auto-merge on green — they require a human
  # owner, who releases the PR with the `dep-review-approved` label. Minor/patch
  # bumps to non-sensitive deps pass and stay auto-mergeable. Gate by what the
  # dependency TOUCHES, not the version-jump size. PR-only. Needs no install.
  # NOTE (owner): to BLOCK merge, mark this a REQUIRED status check in branch
  # protection — the job alone only reports.
  dependency-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Resolve base + head package.json
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          git show "$BASE_SHA:package.json" > /tmp/base-package.json 2>/dev/null || echo '{}' > /tmp/base-package.json
          cp package.json /tmp/head-package.json
      - name: Gate major / money-child-auth dependency changes
        env:
          BASE_PKG: /tmp/base-package.json
          HEAD_PKG: /tmp/head-package.json
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: node scripts/dependency-gate.mjs
